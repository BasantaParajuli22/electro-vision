services:
  electro-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - electro_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_network


  electro-backend:
    build: ./backend
    ports:
      - "${SERVER_PORT}:5000"
    command: "sh -c 'npm run push && npm run seed && node dist/index.js' "
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - SERVER_BASE_URL=${SERVER_BASE_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET} 
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      
      - DB_HOST=electro-postgres
      - DB_PORT=5432

      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - electro-postgres
    networks:
    - backend_network
    - frontend_network
  
  electro-frontend:
    build: 
      context: ./frontend
      args: 
        - VITE_FRONTEND_PORT=${VITE_FRONTEND_PORT}  
        - VITE_SERVER_BASE_URL=${VITE_SERVER_BASE_URL}
        - VITE_RECAPTCHA_SITE_KEY=${VITE_RECAPTCHA_SITE_KEY}   
    ports:
      - "${VITE_FRONTEND_PORT}:80"
    depends_on:
      - electro-backend
    networks:
    - frontend_network
      

# define volumes and network 
volumes:
  electro_data:

networks:
  frontend_network:
  backend_network: